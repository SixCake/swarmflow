<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwarmFlow — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0F172A;
  --bg-secondary: #1E293B;
  --bg-tertiary: #334155;
  --border-color: #334155;
  --text-primary: #F1F5F9;
  --text-secondary: #94A3B8;
  --text-muted: #64748B;
  --accent-purple: #7C3AED;
  --accent-purple-light: #A78BFA;
  --accent-cyan: #06B6D4;
  --accent-red: #EF4444;
  --accent-amber: #F59E0B;
  --font-sans: 'Fira Sans', -apple-system, sans-serif;
  --font-mono: 'Fira Code', monospace;
  --radius-md: 10px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background hex grid pattern */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(6,182,212,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.login-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  padding: 0 20px;
}

.login-brand {
  text-align: center;
  margin-bottom: 32px;
}

.login-brand svg { margin-bottom: 12px; }

.login-brand h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--accent-purple-light), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}

.login-brand p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.login-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 40px rgba(124,58,237,0.06);
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 200ms ease, box-shadow 200ms ease;
}

.form-input:focus {
  border-color: var(--accent-purple);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}

.form-input::placeholder { color: var(--text-muted); }

.btn-login {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent-purple), #6D28D9);
  border: none;
  border-radius: var(--radius-md);
  color: #fff;
  font-family: var(--font-sans);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 200ms ease, transform 100ms ease;
  letter-spacing: 0.02em;
}

.btn-login:hover { opacity: 0.9; }
.btn-login:active { transform: scale(0.98); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

.error-msg {
  display: none;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-md);
  color: var(--accent-red);
  font-size: 0.85rem;
  text-align: center;
}

.error-msg.visible { display: block; }

.lockout-msg {
  display: none;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: rgba(245,158,11,0.1);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: var(--radius-md);
  color: var(--accent-amber);
  font-size: 0.85rem;
  text-align: center;
}

.lockout-msg.visible { display: block; }

.security-note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.78rem;
  color: var(--text-muted);
}

.security-note svg {
  vertical-align: middle;
  margin-right: 4px;
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-brand">
    <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
      <path d="M14 2L24.5 8.5V19.5L14 26L3.5 19.5V8.5L14 2Z" stroke="url(#hex-grad)" stroke-width="2" fill="none"/>
      <path d="M14 8L19 11V17L14 20L9 17V11L14 8Z" fill="url(#hex-grad)" opacity="0.6"/>
      <defs><linearGradient id="hex-grad" x1="3" y1="2" x2="25" y2="26"><stop stop-color="#7C3AED"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
    </svg>
    <h1>SwarmFlow</h1>
    <p>Dashboard Authentication</p>
  </div>

  <div class="login-card">
    <div class="error-msg" id="error-msg"></div>
    <div class="lockout-msg" id="lockout-msg"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button class="btn-login" type="submit" id="btn-login">Sign In</button>
    </form>
  </div>

  <div class="security-note">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Protected by rate limiting and IP lockout
  </div>
</div>

<script>
const form = document.getElementById('login-form');
const errorEl = document.getElementById('error-msg');
const lockoutEl = document.getElementById('lockout-msg');
const btnLogin = document.getElementById('btn-login');

let lockoutTimer = null;

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  errorEl.classList.remove('visible');
  lockoutEl.classList.remove('visible');
  btnLogin.disabled = true;
  btnLogin.textContent = 'Signing in…';

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  try {
    const response = await fetch('/dashboard/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    const data = await response.json();

    if (response.ok && data.success) {
      window.location.href = '/dashboard';
      return;
    }

    if (response.status === 429 && data.retryAfterSeconds) {
      startLockoutCountdown(data.retryAfterSeconds);
    } else {
      errorEl.textContent = data.error || 'Invalid credentials';
      errorEl.classList.add('visible');
    }
  } catch {
    errorEl.textContent = 'Connection error. Please try again.';
    errorEl.classList.add('visible');
  } finally {
    btnLogin.disabled = false;
    btnLogin.textContent = 'Sign In';
  }
});

function startLockoutCountdown(seconds) {
  if (lockoutTimer) clearInterval(lockoutTimer);

  let remaining = seconds;
  btnLogin.disabled = true;
  lockoutEl.classList.add('visible');
  errorEl.classList.remove('visible');
  lockoutEl.textContent = 'Too many attempts. Try again in ' + remaining + 's';

  lockoutTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(lockoutTimer);
      lockoutTimer = null;
      lockoutEl.classList.remove('visible');
      btnLogin.disabled = false;
    } else {
      lockoutEl.textContent = 'Too many attempts. Try again in ' + remaining + 's';
    }
  }, 1000);
}
</script>
</body>
</html>
